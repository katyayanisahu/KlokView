upstream trackflow_backend {
    server backend:8000;
}

server {
    listen 80;
    server_name _;

    # Reasonable upload ceiling for CSV imports / avatars
    client_max_body_size 25m;

    # Gzip text assets
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript
               application/xml text/xml application/rss+xml image/svg+xml;

    # Long-cache hashed Vite assets, no-cache the HTML shell
    location /assets/ {
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # API + admin + auth — proxy everything Django owns
    location /api/ {
        proxy_pass         http://trackflow_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 90s;
    }

    location /admin/ {
        proxy_pass         http://trackflow_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Django collectstatic output, shared via the `trackflow_static` volume
    location /static/ {
        alias /var/www/static/;
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # User-uploaded media, shared via the `trackflow_media` volume
    location /media/ {
        alias /var/www/media/;
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
    }

    # SPA fallback — every other route returns the React shell
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }
}
