# KlokView Jira Forge App — manifest (UI Kit 2 / @forge/react)
#
# Registers a "KlokView Time Tracking" panel inside every Jira issue.
# The panel renders with @forge/react on the client; data fetching happens
# server-side via the resolver function in src/resolvers/index.js, which
# calls the KlokView Django backend (apps/integrations/jira_views.py).
#
# Workflow:
#   Local dev:   forge tunnel    (rewrites api.klokview.dev → localhost:8000)
#   Production:  forge deploy && forge install --site <yoursite>.atlassian.net

modules:
  # Primary entry point — clickable "Open KlokView" label in the issue Details
  # sidebar (Harvest-style). Custom UI bundle lives under static/glance/build.
  jira:issueGlance:
    - key: klokview-time-tracking-glance
      resource: glance
      resolver:
        function: resolver
      title: KlokView Time Tracking
      label: Open KlokView
      icon: https://developer.atlassian.com/platform/forge/images/icons/issue-panel-icon.svg
  # Backup entry points: issuePanel for classic Jira UI + issueAction for the
  # issue "..." menu. Both use the @forge/react UI Kit 2 bundle in src/index.jsx.
  jira:issuePanel:
    - key: klokview-time-tracking-panel
      resource: main
      resolver:
        function: resolver
      render: native
      title: KlokView Time Tracking
      icon: https://developer.atlassian.com/platform/forge/images/icons/issue-panel-icon.svg
  jira:issueAction:
    - key: klokview-time-tracking-action
      resource: main
      resolver:
        function: resolver
      render: native
      title: KlokView Time Tracking
  function:
    - key: resolver
      handler: resolvers.handler

resources:
  - key: main
    path: src/index.jsx
  - key: glance
    path: static/glance/build

app:
  id: ari:cloud:ecosystem::app/26b4d13e-82a2-4e4c-a93f-34cddfdab857
  runtime:
    name: nodejs22.x

permissions:
  # Forge external fetch must be HTTPS. For local dev, `forge tunnel`
  # rewrites this URL → http://localhost:8000 transparently. Replace with
  # your real production URL when deploying.
  external:
    fetch:
      backend:
        # Dev URL — `cloudflared tunnel --url http://localhost:8000` gives a
        # fresh https URL each restart. Update both this list AND
        # src/resolvers.js when it changes, then run `forge deploy`.
        - https://falls-angela-iii-anticipated.trycloudflare.com
  scopes:
    - read:jira-work
    - read:jira-user
