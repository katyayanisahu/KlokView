# KlokView Jira Forge App — manifest (UI Kit 2 / @forge/react)
#
# Registers a "KlokView Time Tracking" panel inside every Jira issue.
# The panel renders with @forge/react on the client; data fetching happens
# server-side via the resolver function in src/resolvers.js, which calls the
# KlokView Django backend (apps/integrations/jira_views.py).
#
# Workflow:
#   Local dev:    forge variables set --environment development KLOKVIEW_BACKEND_URL <prod-url>
#                 forge variables set --environment development KLOKVIEW_WEB_URL     <prod-or-localhost-tunnel>
#                 forge variables set --environment development --encrypt KLOKVIEW_API_KEY <dev-secret>
#                 forge tunnel
#   Production:   forge variables set --environment production KLOKVIEW_BACKEND_URL <prod-url>
#                 forge variables set --environment production KLOKVIEW_WEB_URL     <prod-url>
#                 forge variables set --environment production --encrypt KLOKVIEW_API_KEY <prod-secret>
#                 forge deploy --environment production
#                 (then submit to Atlassian Marketplace as a private listing — see README)

modules:
  # Primary entry point — clickable "Open KlokView" label in the issue Details
  # sidebar (Harvest-style). Custom UI bundle lives under static/glance/build.
  jira:issueGlance:
    - key: klokview-time-tracking-glance
      resource: glance
      resolver:
        function: resolver
      title: KlokView Time Tracking
      label: Open KlokView
      icon: https://developer.atlassian.com/platform/forge/images/icons/issue-panel-icon.svg
  # Backup entry points: issuePanel for classic Jira UI + issueAction for the
  # issue "..." menu. Both use the @forge/react UI Kit 2 bundle in src/index.jsx.
  jira:issuePanel:
    - key: klokview-time-tracking-panel
      resource: main
      resolver:
        function: resolver
      render: native
      title: KlokView Time Tracking
      icon: https://developer.atlassian.com/platform/forge/images/icons/issue-panel-icon.svg
  jira:issueAction:
    - key: klokview-time-tracking-action
      resource: main
      resolver:
        function: resolver
      render: native
      title: KlokView Time Tracking
  function:
    - key: resolver
      handler: resolvers.handler

resources:
  - key: main
    path: src/index.jsx
  - key: glance
    path: static/glance/build

app:
  id: ari:cloud:ecosystem::app/26b4d13e-82a2-4e4c-a93f-34cddfdab857
  runtime:
    name: nodejs22.x
  # Marketplace listing metadata. The vendor name + support email appear on
  # the listing page; bump `version` on every `forge deploy --environment
  # production` that you intend to publish.
  name: KlokView Time Tracking
  description: Track time directly from Jira issues — start/stop timers, log against KlokView projects, and view your team's logged hours per issue.

permissions:
  # Forge external fetch must be HTTPS and listed at build time — env vars
  # CANNOT inject these. List every host the resolver may ever call. For
  # local dev `forge tunnel` rewrites the production URL → localhost:8000
  # transparently, so a single production entry is enough for both envs.
  external:
    fetch:
      backend:
        # PRODUCTION KlokView backend. Replace with your real public HTTPS
        # URL before `forge deploy`. The `.invalid` placeholder will block
        # all backend calls until you swap it.
        - https://api.klokview.invalid
  scopes:
    - read:jira-work
    - read:jira-user
